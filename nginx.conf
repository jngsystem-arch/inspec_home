# 제이앤지시스템 보안 설정 (Nginx 가이드)
# 이 파일을 Nginx 설정의 server 블록 내에 포함하거나 참고하여 적용하십시오.

server {
    listen 80;
    server_name yourdomain.com; # 실제 도메인으로 변경

    # --- [5. 보안 헤더 설정] ---
    
    # 클릭재킹 방지: 사이트가 iframe 내에서 열리는 것을 방지
    add_header X-Frame-Options "DENY" always;

    # MIME 스니핑 방지
    add_header X-Content-Type-Options "nosniff" always;

    # XSS 필터링: 구형 브라우저 보호
    add_header X-XSS-Protection "1; mode=block" always;

    # 리퍼러 정책: 개인정보 보호를 위해 최소한의 경로 정보만 전달
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # HSTS (Strict Transport Security): HTTPS 접속 강제 (SSL 적용 후 주석 해제)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # CSP (Content Security Policy): 허용된 도메인만 로드
    # 참고: 현재 사이트에서 사용하는 외부 서비스(Supabase, Daum 주소, Web3Forms)를 명시함
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://t1.daumcdn.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://vkbcbptetaqtgpjldshk.supabase.co https://api.web3forms.com;" always;

    # --- [3. Rate Limiting 설정] ---
    # Nginx http 블록에 아래 설정이 선행되어야 함:
    # limit_req_zone $binary_remote_addr zone=mylimit:10m rate=1r/s;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;

        # 특정 경로(예: API 전송)에 대한 호출 제한 적용
        # limit_req zone=mylimit burst=5 nodelay;
    }

    # 정적 파일 캐싱 (선택 사항)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
