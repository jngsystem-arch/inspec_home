services:
  web:
    build:
      context: ./homepage
      dockerfile: Dockerfile.dev
    volumes:
      - ./homepage:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
    env_file:
      - ./homepage/.env.local
